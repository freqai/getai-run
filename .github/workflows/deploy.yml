name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set REPO_DIR /root/getai-run
            set REPO_URL https://github.com/freqai/getai-run.git

            echo ">>> Stopping old services (before pull)..."
            if test -d $REPO_DIR
              cd $REPO_DIR
              docker compose down --volumes --remove-orphans 2>/dev/null || true
              docker rm -f cli-proxy-api getai-postgres 2>/dev/null || true
            end

            if not test -d $REPO_DIR
              echo ">>> Cloning repository..."
              git clone $REPO_URL $REPO_DIR
            else
              echo ">>> Pulling latest changes..."
              cd $REPO_DIR
              git reset --hard HEAD
              git pull origin main
            end

            cd $REPO_DIR

            echo ">>> Setting up .env..."
            set NEEDS_GEN 0
            if not test -f .env
              set NEEDS_GEN 1
            else
              if not grep -q '^SQL_DSN=' .env
                set NEEDS_GEN 1
              end
              if not grep -q '^REDIS_CONN_STRING=' .env
                set NEEDS_GEN 1
              end
              if not grep -q '^SESSION_SECRET=' .env
                set NEEDS_GEN 1
              end
            end

            if test $NEEDS_GEN -eq 1
              echo ">>> Generating random credentials..."
              set DB_PASS (openssl rand -hex 24)
              set REDIS_PASS (openssl rand -hex 16)
              set SESSION_SEC (openssl rand -hex 32)

              cp .env .env.bak 2>/dev/null || true
              printf 'POSTGRES_USER=newapi\n' > .env
              printf 'POSTGRES_PASSWORD=%s\n' $DB_PASS >> .env
              printf 'POSTGRES_DB=new-api\n' >> .env
              printf 'SQL_DSN=postgresql://newapi:%s@postgres:5432/new-api?sslmode=disable\n' $DB_PASS >> .env
              printf 'REDIS_PASSWORD=%s\n' $REDIS_PASS >> .env
              printf 'REDIS_CONN_STRING=redis://:%s@redis:6379\n' $REDIS_PASS >> .env
              printf 'SESSION_SECRET=%s\n' $SESSION_SEC >> .env
              printf 'TZ=Asia/Shanghai\n' >> .env
              echo ">>> .env generated"
            else
              echo ">>> .env already has all required variables"
            end

            echo ">>> Setting up data directories..."
            mkdir -p data logs

            echo ">>> Starting containers..."
            docker compose up -d

            echo ">>> Waiting for health check..."
            sleep 5
            docker compose ps

            echo ">>> Pruning old images..."
            docker image prune -f

            echo ">>> DEPLOY SUCCESS"
