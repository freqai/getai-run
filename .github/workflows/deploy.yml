name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set REPO_DIR /root/getai-run
            set REPO_URL https://github.com/freqai/getai-run.git

            if not test -d $REPO_DIR
              echo ">>> Cloning repository..."
              git clone $REPO_URL $REPO_DIR
            else
              echo ">>> Pulling latest changes..."
              cd $REPO_DIR
              git pull origin main
            end

            cd $REPO_DIR

            echo ">>> Stopping old services..."
            set OLD_COMPOSE /root/getai-run/docker-compose.yml
            if test -f $OLD_COMPOSE
              cd /root/getai-run
              docker compose down --volumes 2>/dev/null || true
            end
            cd $REPO_DIR

            echo ">>> Setting up .env..."
            if not test -f .env
              set DB_PASS (openssl rand -hex 24)
              set REDIS_PASS (openssl rand -hex 16)
              set SESSION_SEC (openssl rand -hex 32)

              printf 'POSTGRES_USER=newapi\n' >> .env
              printf 'POSTGRES_PASSWORD=%s\n' $DB_PASS >> .env
              printf 'POSTGRES_DB=new-api\n' >> .env
              printf 'SQL_DSN=postgresql://newapi:%s@postgres:5432/new-api?sslmode=disable\n' $DB_PASS >> .env
              printf 'REDIS_PASSWORD=%s\n' $REDIS_PASS >> .env
              printf 'REDIS_CONN_STRING=redis://:%s@redis:6379\n' $REDIS_PASS >> .env
              printf 'SESSION_SECRET=%s\n' $SESSION_SEC >> .env
              printf 'TZ=Asia/Shanghai\n' >> .env
            else
              echo ">>> .env already exists, preserving..."
            end

            echo ">>> Setting up data directories..."
            mkdir -p data logs

            echo ">>> Starting containers..."
            docker compose up -d

            echo ">>> Pruning old images..."
            docker image prune -f

            echo ">>> Deployment complete"
            docker compose ps
