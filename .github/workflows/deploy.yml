name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set REPO_DIR /root/getai-run
            set REPO_URL https://github.com/freqai/getai-run.git

            if not test -d $REPO_DIR
              echo ">>> Cloning repository..."
              git clone $REPO_URL $REPO_DIR
            else
              echo ">>> Pulling latest changes..."
              cd $REPO_DIR
              git pull origin main
            end

            cd $REPO_DIR

            echo ">>> Preparing runtime files..."
            if test -d config.yaml
              rm -rf config.yaml
            end
            if not test -f config.yaml
              cp config.example.yaml config.yaml
            end
            mkdir -p logs auths

            if not test -f .env
              echo ">>> Bootstrapping .env from .env.example..."
              cp .env.example .env
            end

            if not grep -q '^POSTGRES_PASSWORD=' .env
              set DB_PASS (openssl rand -hex 24)
              printf '\nPOSTGRES_PASSWORD=%s\n' $DB_PASS >> .env
            end
            if not grep -q '^POSTGRES_USER=' .env
              printf 'POSTGRES_USER=getai\n' >> .env
            end
            if not grep -q '^POSTGRES_DB=' .env
              printf 'POSTGRES_DB=getai_run\n' >> .env
            end
            if not grep -q '^PORTAL_DB_SCHEMA=' .env
              printf 'PORTAL_DB_SCHEMA=public\n' >> .env
            end

            echo ">>> Updating website files..."
            mkdir -p /var/www/getai.run
            if test -d website
              cp -R website/. /var/www/getai.run/
            end

            echo ">>> Building and starting containers..."
            docker compose up -d --build

            echo ">>> Pruning old images..."
            docker image prune -f

            echo ">>> Deployment complete"
            docker compose ps
            echo ">>> Website files:"
            ls -la /var/www/getai.run
