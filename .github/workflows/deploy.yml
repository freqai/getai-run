name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set REPO_DIR /root/getai-run
            set REPO_URL https://github.com/freqai/getai-run.git

            echo ">>> Stopping old services (before pull)..."
            # Stop old containers first, while old docker-compose.yml still exists
            if test -d $REPO_DIR
              cd $REPO_DIR
              docker compose down --volumes --remove-orphans 2>/dev/null || true
              # Also kill any leftover containers from previous project
              docker rm -f cli-proxy-api getai-postgres 2>/dev/null || true
            end

            if not test -d $REPO_DIR
              echo ">>> Cloning repository..."
              git clone $REPO_URL $REPO_DIR
            else
              echo ">>> Pulling latest changes..."
              cd $REPO_DIR
              git reset --hard HEAD
              git pull origin main
            end

            cd $REPO_DIR

            echo ">>> Setting up .env..."
            # Force regenerate .env if required vars are missing
            if not test -f .env
              touch .env
            end

            # Check if all required vars exist, if not generate them
            set NEEDS_GEN 0
            if not grep -q '^SQL_DSN=' .env
              set NEEDS_GEN 1
            end
            if not grep -q '^REDIS_CONN_STRING=' .env
              set NEEDS_GEN 1
            end
            if not grep -q '^SESSION_SECRET=' .env
              set NEEDS_GEN 1
            end

            if test $NEEDS_GEN -eq 1
              echo ">>> Generating random credentials..."
              set DB_PASS (openssl rand -hex 24)
              set REDIS_PASS (openssl rand -hex 16)
              set SESSION_SEC (openssl rand -hex 32)

              # Back up existing .env
              cp .env .env.bak 2>/dev/null || true

              cat > .env << ENVEOF
            POSTGRES_USER=newapi
            POSTGRES_PASSWORD=$DB_PASS
            POSTGRES_DB=new-api
            SQL_DSN=postgresql://newapi:$DB_PASS@postgres:5432/new-api?sslmode=disable
            REDIS_PASSWORD=$REDIS_PASS
            REDIS_CONN_STRING=redis://:$REDIS_PASS@redis:6379
            SESSION_SECRET=$SESSION_SEC
            TZ=Asia/Shanghai
            ENVEOF
              echo ">>> .env generated with random credentials"
            else
              echo ">>> .env already has all required variables"
            end

            echo ">>> Setting up data directories..."
            mkdir -p data logs

            echo ">>> Starting containers..."
            docker compose up -d

            echo ">>> Waiting for health check..."
            sleep 5
            docker compose ps

            echo ">>> Pruning old images..."
            docker image prune -f

            echo ">>> Deployment complete"
